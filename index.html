<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro_Nutrient</title>
    <link rel = "stylesheet" href = "./style.css">
    <script src="./script.js" defer></script>

</head>
<body>
    <div class = "heading">
        <h1>Macro Nutrient Calculator</h1>
        <p>Calculate your optimal macronutrient intake for your goals.</p>
        <button id = "darkBtn" class="btn">&#127772 Dark Mode</button>
    </div>
    <div class = "details">
        <h2>Calculator</h2>
        <label>Age:</label>
        <input id = "age" type = "number" class="input">
        <label>Weight(kg):</label>
        <input id ="weight"
        type = "number" class = "input">
        <label>Height (cm):</label>
        <input id = "height" type ="number" class ="input">
        <label>Gender:</label>
        <div class="radio-group">
            <input type="radio" name="gender" id="male" value="male"> Male
            <br>
            <input type="radio" name="gender" id="female" value="female"> Female
        </div>

        <label>Activity Level:</label>
        
        <select id ="activity" class ="input" >
            <option value ="">Select Life Style</option>
            <option value ="1.2">Sedentary (little or no exercise)</option>
            <option value="1.375">Lightly Active (light exercise/sports 1-3 days/week)</option>
            <option value ="1.55">Moderately Acitve (moderate exercise/sports 3-5 days/week)</option>
            <option value ="1.725">Very Active (hard exercise/sports 6-7 days a week)</option>
        </select> 
        <label>Goal:</label>
        
        <select id ="goal" class = "input">
            <option value ="">Select Goal</option>
            <option value ="lose">Weight Loss</option>
            <option value="maintain">Maintain Weight</option>
            <option value ="gain">Muscle gain</option>

        </select>

        <div class = btns>
        <button id = "calculate">Calculate</button> 
        <button id = "clear">Clear</button>
        </div> 
    </div>
    <div id ="resultBox"></div>
    <div id="recipeSection" class = "recipe-img"></div>
    <footer class = "footer">@ 2024 Macro Nutrient Calculator. All rights reserved
    <div>
    <a href ="">Privacy Policy</a> | <a href ="">Terms of Service</a>
    </div>
    </footer>
</body>
</html>
